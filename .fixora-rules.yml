rules:
- id: fixora-wrapper-make-gemini-api-request
  pattern: "def _make_gemini_api_request(...):\n  ..."
  message: 'Vulnerable function ''_make_gemini_api_request()'' wraps httpx.AsyncClient,
    client.post, client.get. Vulnerability: Insecure Direct Object Reference. User-controlled
    data is passed to the Gemini API without proper validation or sanitization, potentially
    allowing unauthorized access to sensitive data.'
  severity: WARNING
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Insecure Direct Object Reference
    confidence: MEDIUM
    wrapper_defined_in: backend/ai_services.py
    wraps:
    - httpx.AsyncClient
    - client.post
    - client.get
    modules_used:
    - httpx
    - fastapi
- id: fixora-wrapper-refresh-access-token
  pattern: "def refresh_access_token(...):\n  ..."
  message: 'Vulnerable function ''refresh_access_token()'' wraps jwt.decode, create_access_token.
    Vulnerability: JSON Web Token (JWT) Vulnerability. The refresh token is decoded
    without proper validation, potentially allowing an attacker to manipulate the
    token and gain unauthorized access.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: JSON Web Token (JWT) Vulnerability
    confidence: HIGH
    wrapper_defined_in: backend/app.py
    wraps:
    - jwt.decode
    - create_access_token
    modules_used:
    - jwt
    - fastapi
- id: fixora-wrapper-login-user
  pattern: "def login_user(...):\n  ..."
  message: 'Vulnerable function ''login_user()'' wraps authenticate_user_detailed,
    update_last_login, create_access_token. Vulnerability: Authentication Bypass.
    The authentication process does not properly validate user credentials, potentially
    allowing an attacker to bypass authentication and gain unauthorized access.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
