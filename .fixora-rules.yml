- id: fixora-wrapper-get-user-by-email
  pattern: "def get_user_by_email(...):\n  ..."
  message: 'Vulnerable function ''get_user_by_email()'' wraps client.table. Vulnerability:
    SQL Injection. User-controlled email is used in a query without proper sanitization,
    but Supabase''s Python client uses parameterized queries by default, reducing
    the risk.'
  severity: WARNING
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: SQL Injection
    confidence: MEDIUM
