    - create_access_token
    modules_used:
    - authentication
    - fastapi
- id: fixora-wrapper-upload-document
  pattern: "def upload_document(...):\n  ..."
  message: 'Vulnerable function ''upload_document()'' wraps os.path.splitext, os.path.join,
    open, shutil.copyfileobj. Vulnerability: Arbitrary File Write. User-controlled
    file is saved to a fixed directory without proper validation or sanitization,
    potentially allowing an attacker to write files to arbitrary locations on the
    system.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Arbitrary File Write
    confidence: HIGH
    wrapper_defined_in: backend/app.py
    wraps:
    - os.path.splitext
    - os.path.join
    - open
    - shutil.copyfileobj
    modules_used:
    - os
    - shutil
- id: fixora-wrapper-delete-file
  pattern: "def delete_file(...):\n  ..."
  message: 'Vulnerable function ''delete_file()'' wraps os.path.join, os.remove. Vulnerability:
